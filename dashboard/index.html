<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, height=600, initial-scale=1.0, user-scalable=no">
  <title>ADHD Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="state-banner">
    <span id="state-name">Loading&hellip;</span>
  </header>
  <main>
    <section id="buffers-section" class="panel">
      <h2>Buffers</h2>
      <div id="buffers-list"></div>
    </section>
    <section id="tasks-section" class="panel">
      <h2>Tasks</h2>
      <ul id="tasks-list"></ul>
    </section>
    <section id="schedule-section" class="panel">
      <h2>Schedule</h2>
      <ul id="schedule-list"></ul>
    </section>
    <section id="activity-section" class="panel">
      <h2>Activity</h2>
      <ul id="activity-list"></ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
